<script>
(function(){
  // 1. منع تضمين المنصة في إطارات وهمية لحماية الحسابات (Anti-Clickjacking Frame-Busting)
  try {
    if (window.top !== window.self && !window.location.hostname.includes('arena.ai') && !window.location.hostname.includes('onrender.com') && !window.location.hostname.includes('localhost')) {
      window.top.location.href = window.self.location.href;
    }
  } catch (e) {}

  // 2. منع القائمة المنسدلة عند النقر بالزر الأيمن (Right-Click Context Menu)
  document.addEventListener('contextmenu', function(e) {
    if(!['INPUT', 'TEXTAREA'].includes(e.target.tagName)) {
      e.preventDefault();
      return false;
    }
  }, false);

  // 3. منع تحديد النص والاقتصاص والنسخ والسحب (Copy, Cut, SelectStart, DragStart)
  ['copy', 'cut', 'selectstart', 'dragstart'].forEach(function(evt) {
    document.addEventListener(evt, function(e) {
      if(!['INPUT', 'TEXTAREA'].includes(e.target.tagName)) {
        e.preventDefault();
        return false;
      }
    }, false);
  });

  // 4. منع اختصارات لوحة المفاتيح الخاصة بالنسخ، الطباعة، الحفظ، وأدوات المطورين والسكرينشوت
  document.addEventListener('keydown', function(e) {
    // PrintScreen Key
    if(e.key === 'PrintScreen' || e.keyCode === 44) {
      e.preventDefault();
      triggerAntiScreenshotAlert();
      return false;
    }
    // F12 (DevTools) or Ctrl+Shift+I/J/C
    if(e.key === 'F12' || e.keyCode === 123) {
      e.preventDefault();
      triggerAntiScreenshotAlert();
      return false;
    }
    // Ctrl+C, Ctrl+X, Ctrl+S, Ctrl+P, Ctrl+U (View Source)
    if(e.ctrlKey || e.metaKey) {
      const k = e.key ? e.key.toLowerCase() : '';
      if(['c', 'x', 's', 'p', 'u'].includes(k) && !['INPUT', 'TEXTAREA'].includes(e.target.tagName)) {
        e.preventDefault();
        return false;
      }
      if(e.shiftKey && ['i', 'j', 'c', 's'].includes(k)) {
        e.preventDefault();
        triggerAntiScreenshotAlert();
        return false;
      }
    }
  }, false);

  // 5. دالة تفعيل شاشة التعتيم والإشعار الفوري عند اكتشاف التقاط الشاشة أو فحص الكود
  function triggerAntiScreenshotAlert() {
    const overlay = document.getElementById('antiScreenshotOverlay');
    if(overlay) {
      overlay.style.display = 'flex';
      try { if(navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText('محتوى محمي - منصة SAC SVT prof'); } catch(err) {}
      setTimeout(function() {
        overlay.style.display = 'none';
      }, 3500);
    }
  }

  // 6. التعتيم عند فقدان التركيز (Snipping Tool / Screen Recording Blur Protection)
  window.addEventListener('blur', function() {
    if(document.activeElement && ['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)) return;
    const overlay = document.getElementById('antiScreenshotOverlay');
    if(overlay) overlay.style.display = 'flex';
  });

  window.addEventListener('focus', function() {
    const overlay = document.getElementById('antiScreenshotOverlay');
    if(overlay) overlay.style.display = 'none';
  });

  document.addEventListener('keyup', function(e) {
    if(e.key === 'PrintScreen' || e.keyCode === 44) {
      triggerAntiScreenshotAlert();
    }
  }, false);

  // 7. كاشف أدوات المطورين النشط (Active DevTools Detector Trap)
  setInterval(function() {
    const widthThreshold = window.outerWidth - window.innerWidth > 170;
    const heightThreshold = window.outerHeight - window.innerHeight > 170;
    if(widthThreshold || heightThreshold) {
      const overlay = document.getElementById('antiScreenshotOverlay');
      if(overlay && overlay.style.display !== 'flex') {
        overlay.style.display = 'flex';
      }
    }
  }, 1000);
  // 8. نظام الخاتم المائي الديناميكي المقاوم لتصوير الهاتف واستخراج النصوص (Anti-OCR & Camera Shield)
  try {
    const sess = localStorage.getItem("sac_session") || localStorage.getItem("sac_role") || "SAC · SVT prof";
    const stampText = sess !== "SAC · SVT prof" ? `⚠️ منصة SAC · SVT prof · إنجاز وتجميع قائم على أعمال نخبة من أساتذة المادة ⚠️ نسخة مرخصة لحساب (${sess})` : "⚠️ منصة SAC · SVT prof · إنجاز وتجميع قائم على أعمال نخبة من أساتذة المادة ⚠️";
    const watermarkDiv = document.createElement("div");
    watermarkDiv.id = "sacAntiOcrWatermark";
    watermarkDiv.style.cssText = "position:fixed;inset:-200px;z-index:999998;pointer-events:none;display:flex;flex-wrap:wrap;align-content:space-around;justify-content:space-around;overflow:hidden;opacity:0.045;user-select:none;font-family:Tajawal,sans-serif;font-weight:800;font-size:1.15rem;color:#0a5860;transform:rotate(-24deg);white-space:nowrap;";
    let patternHTML = "";
    for(let i=0; i<60; i++) {
      patternHTML += `<span style="padding:32px 48px;letter-spacing:1px;">${stampText}</span>`;
    }
    watermarkDiv.innerHTML = patternHTML;
    document.body.appendChild(watermarkDiv);
  } catch(e) {}

  // 9. شريط التحكم الشامل والأبدي للأدمين (Top Admin Toolbar across all pages)
  window.renderTopAdminToolbar = function() {
    const role = localStorage.getItem("sac_role");
    const sess = localStorage.getItem("sac_session") || localStorage.getItem("sac_user_session");
    let users = {};
    try { users = JSON.parse(localStorage.getItem("sac_users") || "{}"); } catch(e){}

    if (!isAdmin) {
      if (existing) existing.remove();
      return;
    }
    
    if (!existing) {
      existing = document.createElement("div");
      existing.id = "sacTopAdminToolbar";
      existing.style.cssText = "position:sticky; top:0; left:0; right:0; z-index:999999; background:linear-gradient(135deg, #0a3a40, #115860); border-bottom:2px solid #f59e0b; padding:8px 16px; display:flex; flex-wrap:wrap; align-items:center; justify-content:center; gap:8px; box-shadow:0 4px 20px rgba(0,0,0,0.3); font-family:Tajawal,sans-serif; direction:rtl;";
      document.body.insertBefore(existing, document.body.firstChild);
    }
    
    const currentPath = window.location.pathname.split("/").pop() || "index.html";
    const isBoard = (currentPath === "admin.html" || currentPath.includes("admin.html"));
    const curTab = window.currentBoardTab || sessionStorage.getItem("sac_admin_tab") || "users";
    
    existing.innerHTML = `
      <span style="color:#f59e0b; font-weight:800; font-size:0.92rem; display:flex; align-items:center; gap:6px; margin-inline-end:8px;">
        <span>👑 شريط المسؤول الشامل:</span>
      </span>
      <button onclick="goToAdminTab('users')" style="background:${isBoard && curTab==='users'?'#f59e0b':'rgba(255,255,255,0.14)'}; color:#fff; border:1px solid ${isBoard && curTab==='users'?'#f59e0b':'rgba(255,255,255,0.25)'}; padding:6px 13px; border-radius:10px; font-weight:700; font-size:0.85rem; cursor:pointer; font-family:inherit; transition:0.2s;">👥 إدارة المستخدمين</button>
      <button onclick="goToAdminTab('content')" style="background:${isBoard && curTab==='content'?'#f59e0b':'rgba(255,255,255,0.14)'}; color:#fff; border:1px solid ${isBoard && curTab==='content'?'#f59e0b':'rgba(255,255,255,0.25)'}; padding:6px 13px; border-radius:10px; font-weight:700; font-size:0.85rem; cursor:pointer; font-family:inherit; transition:0.2s;">📚 إدارة المحتويات</button>
      <button onclick="goToAdminTab('files')" style="background:${isBoard && curTab==='files'?'#f59e0b':'rgba(255,255,255,0.14)'}; color:#fff; border:1px solid ${isBoard && curTab==='files'?'#f59e0b':'rgba(255,255,255,0.25)'}; padding:6px 13px; border-radius:10px; font-weight:700; font-size:0.85rem; cursor:pointer; font-family:inherit; transition:0.2s;">⬆️ الملفات المرفوعة</button>
      <button onclick="goToAdminTab('comments')" style="background:${isBoard && curTab==='comments'?'#f59e0b':'rgba(255,255,255,0.14)'}; color:#fff; border:1px solid ${isBoard && curTab==='comments'?'#f59e0b':'rgba(255,255,255,0.25)'}; padding:6px 13px; border-radius:10px; font-weight:700; font-size:0.85rem; cursor:pointer; font-family:inherit; transition:0.2s;">💬 إدارة التعليقات والمناقشات</button>
      <button onclick="window.location.href='index.html'" style="background:${!isBoard?'#10b981':'rgba(255,255,255,0.14)'}; color:#fff; border:1px solid ${!isBoard?'#10b981':'rgba(255,255,255,0.25)'}; padding:6px 13px; border-radius:10px; font-weight:700; font-size:0.85rem; cursor:pointer; font-family:inherit; transition:0.2s;">🌐 تصفح المنصة كمسؤول</button>
      <button onclick="adminGlobalLogout()" style="background:#ef4444; color:#fff; border:1px solid #dc2626; padding:6px 13px; border-radius:10px; font-weight:700; font-size:0.85rem; cursor:pointer; font-family:inherit; transition:0.2s;">🚪 تسجيل الخروج</button>
    `;
  };

  window.goToAdminTab = function(tabName) {
    sessionStorage.setItem("sac_admin_tab", tabName);
    const currentPath = window.location.pathname.split("/").pop() || "index.html";
    if (currentPath === "admin.html" || currentPath.includes("admin.html")) {
      if (typeof switchBoard === "function") {
        switchBoard(tabName);
      } else {
        window.location.href = "admin.html";
      }
    } else {
      window.location.href = "admin.html";
    }
  };

  window.adminGlobalLogout = function() {
    localStorage.removeItem("sac_session");
    localStorage.removeItem("sac_role");
    localStorage.removeItem("sac_user_session");
    sessionStorage.removeItem("sac_admin_tab");
    if (typeof updateAuthNavbar === "function") updateAuthNavbar();
    if (typeof updateJilThaniNavbar === "function") updateJilThaniNavbar();
    if (typeof renderUserbox === "function") renderUserbox();
    const existing = document.getElementById("sacTopAdminToolbar");
    if (existing) existing.remove();
    const currentPath = window.location.pathname.split("/").pop() || "index.html";
    if (currentPath === "admin.html" || currentPath.includes("admin.html")) {
      window.location.href = "index.html";
    } else {
      window.location.reload();
    }
  };

  renderTopAdminToolbar();
})();
</script>

    throw new Error('locked');
  }
})();
