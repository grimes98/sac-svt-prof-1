  :root{
    --green:#00a8a8; --green-d:#0e6e78; --green-dark:#0a5860; --green-l:#2dd4bf;
    --gold:#f59e0b; --gold-d:#d97706; --gold-l:#fbbf24;
    --bg:#e2f6f6; --card:#ffffff; --ink:#0a5860;
    --muted:#4d7378; --line:rgba(0,168,168,0.28); --shadow:0 25px 80px rgba(10,88,96,0.18);
    --radius:22px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Tajawal','Segoe UI','Tahoma',system-ui,sans-serif;
    /* خلفية قرادينت متدرجة بألوان المنصة الزمردية الفاتحة */
    background:linear-gradient(135deg, #dff4f4 0%, #ebf9f9 45%, #cceeee 100%);
    color:var(--ink); line-height:1.85; font-weight:400;
    font-size:16px; -webkit-font-smoothing:antialiased;
    min-height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center;
    padding:40px 18px; position:relative; overflow-x:hidden;
  }
  a{color:inherit;text-decoration:none}
  .container{max-width:480px; width:100%; margin:0 auto; position:relative; z-index:2;}
  
  /* ألوان الكتابة متناسقة مع الألوان الخضراء تاع الشعار */
  .brand{display:flex;align-items:center;justify-content:center;gap:12px;font-weight:800;color:var(--green-dark);font-size:1.5rem;margin-bottom:26px;letter-spacing:-0.3px;}
  .brand img{max-height:165px; height:165px; width:auto; filter:drop-shadow(0 4px 12px rgba(0,168,168,0.25));}
  .card{background:rgba(255,255,255,0.95); backdrop-filter:blur(16px); border-radius:24px; padding:38px 32px; box-shadow:var(--shadow); border:1.5px solid var(--line); position:relative;}
  
  h2{color:var(--green-dark); font-weight:800; font-size:1.52rem; text-align:center; margin-bottom:8px;}
  p.sub{color:var(--muted); font-size:0.94rem; text-align:center; margin-bottom:28px; line-height:1.5;}
  
  .tabs{display:flex; gap:8px; background:#dcf2f2; border:1px solid rgba(0,168,168,0.2); border-radius:16px; padding:6px; margin-bottom:26px;}
  .tabs button{flex:1; border:none; padding:12px 10px; border-radius:12px; font-family:inherit; font-weight:700; font-size:0.94rem; cursor:pointer; transition:.25s;}
  .tabs button.active{background:#fff; box-shadow:0 3px 12px rgba(10,88,96,0.18); color:var(--green-dark);}
  .tabs button.inactive{background:transparent; color:#5b8287;}
  .tabs button.inactive:hover{color:var(--green-dark);}
  
  .field{margin-bottom:18px; text-align:right;}
  .field label{display:block; font-weight:700; font-size:0.92rem; margin-bottom:6px; color:var(--green-dark);}
  .field input{width:100%; padding:13px 15px; border:1.5px solid #bce2e2; border-radius:14px; font-family:inherit; font-size:0.96rem; transition:.2s; background:#fff; color:var(--green-dark); font-weight:600;}
  .field input::placeholder{color:#8aaeb2; font-weight:400;}
  .field input:focus{border-color:var(--green); outline:none; box-shadow:0 0 0 4px rgba(0,168,168,.18);}
  
  .btn{display:flex; align-items:center; justify-content:center; width:100%; background:linear-gradient(135deg, #00a8a8, #0e6e78); color:#fff; border:none; padding:14px; border-radius:14px; font-family:inherit; font-weight:700; font-size:1.05rem; cursor:pointer; transition:.2s; box-shadow:0 6px 18px rgba(0,168,168,.35);}
  .btn:hover{background:linear-gradient(135deg, #2dd4bf, #00a8a8); transform:translateY(-1.5px); box-shadow:0 8px 22px rgba(0,168,168,.45);}
  
  /* زر تسجيل الدخول تاع الأدمن باللون الذهبي الفخم */
  .btn.gold{background:linear-gradient(135deg, #f59e0b, #d97706); color:#fff; border:1px solid #fbbf24; text-shadow:0 1px 2px rgba(0,0,0,0.15); box-shadow:0 6px 20px rgba(245,158,11,.4);}
  .btn.gold:hover{background:linear-gradient(135deg, #fbbf24, #f59e0b); transform:translateY(-1.5px); box-shadow:0 8px 24px rgba(245,158,11,.52);}
  
  .msg{margin-top:16px; padding:13px 16px; border-radius:12px; font-size:0.9rem; text-align:center; display:none;}
  .msg.ok{background:#f0fdf4; color:#166534; border:1px solid #bbf7d0; display:block;}
  .msg.err{background:#fff1f2; color:#be123c; border:1px solid #fecdd3; display:block;}
  
  .back-link{text-align:center; margin-top:26px; font-size:0.94rem;}
  .back-link a{color:var(--green-dark); font-weight:700; padding:8px 16px; border-radius:12px; transition:.2s; display:inline-block;}
  .back-link a:hover{background:rgba(0,168,168,0.14); color:var(--green); transform:translateY(-1px);}
</style>

<script>
const KEY='sac_users', SESS='sac_session';
const SUPABASE_URL = "https://lkxfjjyvqmzuoxmdoswv.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxreGZqanl2cW16dW94bWRvc3d2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwOTM5NTYsImV4cCI6MjA5ODY2OTk1Nn0.TB5DRKXUB5Gfu-YkodmWxq_EXVbiq7t1o_bzxWj-ZTY";

function getUsers(){try{return JSON.parse(localStorage.getItem(KEY))||{}}catch(e){return{}}}
function saveUsers(u){localStorage.setItem(KEY,JSON.stringify(u))}

(function(){
  const u = getUsers();
  if(!u['prof@sac.dz']){ u['prof@sac.dz'] = { name: 'الأستاذ التجريبي', pass: '1234', type: 'user' }; saveUsers(u); }
  if(!u['grimaldiwidad@gmail.com']){ u['grimaldiwidad@gmail.com'] = { name: 'wided', pass: '1234', type: 'user' }; saveUsers(u); }
  
  if(sessionStorage.getItem('sac_login_tab') === 'admin'){
    sessionStorage.removeItem('sac_login_tab');
    switchTab('admin');
  }
})();

function switchTab(t){
  const uBtn = document.getElementById('tabUserBtn');
  const aBtn = document.getElementById('tabAdminBtn');
  const uSec = document.getElementById('userSection');
  const aSec = document.getElementById('adminSection');
  if(t === 'admin'){
    aBtn.className = 'active'; uBtn.className = 'inactive';
    aSec.style.display = 'block'; uSec.style.display = 'none';
  } else {
    uBtn.className = 'active'; aBtn.className = 'inactive';
    uSec.style.display = 'block'; aSec.style.display = 'none';
  }
}

async function doUserLogin(){
  const em = document.getElementById('userEmail').value.trim().toLowerCase();
  const ps = document.getElementById('userPass').value.trim();
  const msg = document.getElementById('userMsg'); msg.className = 'msg';
  const u = getUsers();
  if(!em || !ps){ msg.textContent = 'الرجاء ملء جميع الحقول'; msg.classList.add('err'); return; }

  const isDefaultAdmin = (em === 'admin@sac-svt.dz' || em === 'admin' || em === 'grimesamani98@gmail.com') && (ps.toLowerCase() === 'admin123' || (u[em] && u[em].pass === ps));
  if(isDefaultAdmin || (u[em] && u[em].pass === ps && u[em].type === 'admin')){
    executeAdminSuccess(em, msg);
    return;
  }

  if(u[em] && u[em].pass === ps){
    localStorage.setItem(SESS, em);
    localStorage.setItem('sac_role', 'user');
    msg.textContent = 'تم الدخول بنجاح ✓ جاري التوجيه للصفحة الرئيسية...'; msg.classList.add('ok');
    const redirect = sessionStorage.getItem('sac_redirect') || 'index.html';
    sessionStorage.removeItem('sac_redirect');
    setTimeout(()=>{ window.location.href = redirect; }, 500);
    return;
  }

  if(window.supabase){
    try{
      msg.textContent = '⏳ جاري التحقق في Supabase...'; msg.classList.add('ok');
      const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      let { data, error } = await sb.from('users').select('*').eq('email', em).single();
      if(error || !data){
        const pRes = await sb.from('profiles').select('*').eq('email', em).single();
        if(!pRes.error && pRes.data) data = pRes.data;
      }
      if(data && data.password === ps){
        u[em] = { id: data.id, name: data.name, email: data.email, pass: data.password, type: data.type };
        saveUsers(u);
        if(data.type === 'admin'){
          executeAdminSuccess(em, msg);
        } else {
          localStorage.setItem(SESS, em);
          localStorage.setItem('sac_role', data.type || 'user');
          msg.textContent = 'تم الدخول بنجاح ✓ جاري التوجيه...'; msg.className = 'msg ok';
          const redirect = sessionStorage.getItem('sac_redirect') || 'index.html';
          sessionStorage.removeItem('sac_redirect');
          setTimeout(()=>{ window.location.href = redirect; }, 500);
        }
        return;
      }
    }catch(err){}
  }

  msg.textContent = 'بيانات الدخول غير صحيحة أو الحساب غير مسجل بالمنصة'; msg.className = 'msg err';
}

function executeAdminSuccess(em, msgElem){
  const realEmail = em === 'admin' ? 'admin@sac-svt.dz' : em;
  localStorage.setItem(SESS, realEmail);
  localStorage.setItem('sac_role', 'admin');
  
  if(msgElem){
    msgElem.className = 'msg ok';
    msgElem.innerHTML = `<b>✓ تم دخول المسؤول بنجاح!</b><br>جاري توجيهك الآن مباشرة إلى لوحة التحكم الشاملة...`;
  }

  setTimeout(() => {
    try { window.location.assign('admin.html'); } catch(e) {}
    try { window.location.href = 'admin.html'; } catch(e) {}
    try { if (window.top && window.top !== window) window.top.location.href = 'admin.html'; } catch(e) {}
  }, 300);
}

async function doAdminLogin(){
  const em = document.getElementById('adminEmail').value.trim().toLowerCase();
  const ps = document.getElementById('adminPass').value.trim();
  const msg = document.getElementById('adminMsg'); msg.className = 'msg';
  const u = getUsers();

  const isDefaultCreds = (em === 'admin@sac-svt.dz' || em === 'admin' || em === 'grimesamani98@gmail.com') && (ps.toLowerCase() === 'admin123' || (u[em] && u[em].pass === ps));
  const isStoredAdmin = (u[em] && u[em].pass === ps && u[em].type === 'admin');

  if(isDefaultCreds || isStoredAdmin){
    executeAdminSuccess(em, msg);
    return;
  }

  if(window.supabase){
    try{
      msg.textContent = '⏳ جاري التحقق من حساب المسؤول في Supabase...'; msg.classList.add('ok');
      const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      let { data, error } = await sb.from('users').select('*').eq('email', em).eq('type', 'admin').single();
      if(error || !data){
        const pRes = await sb.from('profiles').select('*').eq('email', em).eq('type', 'admin').single();
        if(!pRes.error && pRes.data) data = pRes.data;
      }
      if(!error && data && data.password === ps){
        u[em] = { id: data.id, name: data.name, email: data.email, pass: data.password, type: 'admin' };
        saveUsers(u);
        executeAdminSuccess(em, msg);
        return;
      }
    }catch(err){}
  }

  msg.textContent = '❌ بيانات دخول المسؤول غير صحيحة (تأكد أن البريد admin@sac-svt.dz وكلمة المرور admin123)'; msg.className = 'msg err';
}
</script>

  color: #daeeee;
  max-width: 500px;
  line-height: 1.65;
}
</style>

<div id="antiScreenshotOverlay">
  <div style="font-size: 7.5rem; filter: drop-shadow(0 0 35px rgba(45,212,191,0.6));">🛡️</div>
</div>

<script>
(function(){
  // 1. منع تضمين المنصة في إطارات وهمية لحماية الحسابات (Anti-Clickjacking Frame-Busting)
  try {
    if (window.top !== window.self && !window.location.hostname.includes('arena.ai') && !window.location.hostname.includes('onrender.com') && !window.location.hostname.includes('localhost')) {
      window.top.location.href = window.self.location.href;
    }
  } catch (e) {}

  // 2. منع القائمة المنسدلة عند النقر بالزر الأيمن (Right-Click Context Menu)
  document.addEventListener('contextmenu', function(e) {
    if(!['INPUT', 'TEXTAREA'].includes(e.target.tagName)) {
      e.preventDefault();
      return false;
    }
  }, false);

  // 3. منع تحديد النص والاقتصاص والنسخ والسحب (Copy, Cut, SelectStart, DragStart)
  ['copy', 'cut', 'selectstart', 'dragstart'].forEach(function(evt) {
    document.addEventListener(evt, function(e) {
      if(!['INPUT', 'TEXTAREA'].includes(e.target.tagName)) {
        e.preventDefault();
        return false;
      }
    }, false);
  });

  // 4. منع اختصارات لوحة المفاتيح الخاصة بالنسخ، الطباعة، الحفظ، وأدوات المطورين والسكرينشوت
  document.addEventListener('keydown', function(e) {
    // PrintScreen Key
    if(e.key === 'PrintScreen' || e.keyCode === 44) {
      e.preventDefault();
      triggerAntiScreenshotAlert();
      return false;
    }
    // F12 (DevTools) or Ctrl+Shift+I/J/C
    if(e.key === 'F12' || e.keyCode === 123) {
      e.preventDefault();
      triggerAntiScreenshotAlert();
      return false;
    }
    // Ctrl+C, Ctrl+X, Ctrl+S, Ctrl+P, Ctrl+U (View Source)
    if(e.ctrlKey || e.metaKey) {
      const k = e.key ? e.key.toLowerCase() : '';
      if(['c', 'x', 's', 'p', 'u'].includes(k) && !['INPUT', 'TEXTAREA'].includes(e.target.tagName)) {
        e.preventDefault();
        return false;
      }
      if(e.shiftKey && ['i', 'j', 'c', 's'].includes(k)) {
        e.preventDefault();
        triggerAntiScreenshotAlert();
        return false;
      }
    }
  }, false);

  // 5. دالة تفعيل شاشة التعتيم والإشعار الفوري عند اكتشاف التقاط الشاشة أو فحص الكود
  function triggerAntiScreenshotAlert() {
    const overlay = document.getElementById('antiScreenshotOverlay');
    if(overlay) {
      overlay.style.display = 'flex';
      try { if(navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText('محتوى محمي - منصة SAC SVT prof'); } catch(err) {}
      setTimeout(function() {
        overlay.style.display = 'none';
      }, 3500);
    }
  }

  // 6. التعتيم عند فقدان التركيز (Snipping Tool / Screen Recording Blur Protection)
  window.addEventListener('blur', function() {
    if(document.activeElement && ['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)) return;
    const overlay = document.getElementById('antiScreenshotOverlay');
    if(overlay) overlay.style.display = 'flex';
  });

  window.addEventListener('focus', function() {
    const overlay = document.getElementById('antiScreenshotOverlay');
    if(overlay) overlay.style.display = 'none';
  });

  document.addEventListener('keyup', function(e) {
    if(e.key === 'PrintScreen' || e.keyCode === 44) {
      triggerAntiScreenshotAlert();
    }
  }, false);

  // 7. كاشف أدوات المطورين النشط (Active DevTools Detector Trap)
  setInterval(function() {
    const widthThreshold = window.outerWidth - window.innerWidth > 170;
    const heightThreshold = window.outerHeight - window.innerHeight > 170;
    if(widthThreshold || heightThreshold) {
      const overlay = document.getElementById('antiScreenshotOverlay');
      if(overlay && overlay.style.display !== 'flex') {
        overlay.style.display = 'flex';
      }
    }
  }, 1000);
  // 8. نظام الخاتم المائي الديناميكي المقاوم لتصوير الهاتف واستخراج النصوص (Anti-OCR & Camera Shield)
  try {
    const sess = localStorage.getItem("sac_session") || localStorage.getItem("sac_role") || "SAC · SVT prof";
    const stampText = sess !== "SAC · SVT prof" ? `⚠️ منصة SAC · SVT prof · إنجاز وتجميع قائم على أعمال نخبة من أساتذة المادة ⚠️ نسخة مرخصة لحساب (${sess})` : "⚠️ منصة SAC · SVT prof · إنجاز وتجميع قائم على أعمال نخبة من أساتذة المادة ⚠️";
    const watermarkDiv = document.createElement("div");
    watermarkDiv.id = "sacAntiOcrWatermark";
    watermarkDiv.style.cssText = "position:fixed;inset:-200px;z-index:999998;pointer-events:none;display:flex;flex-wrap:wrap;align-content:space-around;justify-content:space-around;overflow:hidden;opacity:0.045;user-select:none;font-family:Tajawal,sans-serif;font-weight:800;font-size:1.15rem;color:#0a5860;transform:rotate(-24deg);white-space:nowrap;";
    let patternHTML = "";
    for(let i=0; i<60; i++) {
      patternHTML += `<span style="padding:32px 48px;letter-spacing:1px;">${stampText}</span>`;
    }
    watermarkDiv.innerHTML = patternHTML;
    document.body.appendChild(watermarkDiv);
  } catch(e) {}

  // 9. شريط التحكم الشامل والأبدي للأدمين (Top Admin Toolbar across all pages)
  window.renderTopAdminToolbar = function() {
    const role = localStorage.getItem("sac_role");
    const sess = localStorage.getItem("sac_session") || localStorage.getItem("sac_user_session");
    let users = {};
    try { users = JSON.parse(localStorage.getItem("sac_users") || "{}"); } catch(e){}
    const isAdmin = (role === "admin" || sess === "admin@sac-svt.dz" || sess === "admin" || (users[sess] && users[sess].type === "admin"));
    
    let existing = document.getElementById("sacTopAdminToolbar");
    if (!isAdmin) {
      if (existing) existing.remove();
      return;
    }
    
    if (!existing) {
      existing = document.createElement("div");
      existing.id = "sacTopAdminToolbar";
      existing.style.cssText = "position:sticky; top:0; left:0; right:0; z-index:999999; background:linear-gradient(135deg, #0a3a40, #115860); border-bottom:2px solid #f59e0b; padding:8px 16px; display:flex; flex-wrap:wrap; align-items:center; justify-content:center; gap:8px; box-shadow:0 4px 20px rgba(0,0,0,0.3); font-family:Tajawal,sans-serif; direction:rtl;";
      document.body.insertBefore(existing, document.body.firstChild);
    }
    
    const currentPath = window.location.pathname.split("/").pop() || "index.html";
    const isBoard = (currentPath === "admin.html" || currentPath.includes("admin.html"));
    const curTab = window.currentBoardTab || sessionStorage.getItem("sac_admin_tab") || "users";
    
    existing.innerHTML = `
      <span style="color:#f59e0b; font-weight:800; font-size:0.92rem; display:flex; align-items:center; gap:6px; margin-inline-end:8px;">
        <span>👑 شريط المسؤول الشامل:</span>
      </span>
      <button onclick="goToAdminTab('users')" style="background:${isBoard && curTab==='users'?'#f59e0b':'rgba(255,255,255,0.14)'}; color:#fff; border:1px solid ${isBoard && curTab==='users'?'#f59e0b':'rgba(255,255,255,0.25)'}; padding:6px 13px; border-radius:10px; font-weight:700; font-size:0.85rem; cursor:pointer; font-family:inherit; transition:0.2s;">👥 إدارة المستخدمين</button>
      <button onclick="goToAdminTab('content')" style="background:${isBoard && curTab==='content'?'#f59e0b':'rgba(255,255,255,0.14)'}; color:#fff; border:1px solid ${isBoard && curTab==='content'?'#f59e0b':'rgba(255,255,255,0.25)'}; padding:6px 13px; border-radius:10px; font-weight:700; font-size:0.85rem; cursor:pointer; font-family:inherit; transition:0.2s;">📚 إدارة المحتويات</button>
      <button onclick="goToAdminTab('files')" style="background:${isBoard && curTab==='files'?'#f59e0b':'rgba(255,255,255,0.14)'}; color:#fff; border:1px solid ${isBoard && curTab==='files'?'#f59e0b':'rgba(255,255,255,0.25)'}; padding:6px 13px; border-radius:10px; font-weight:700; font-size:0.85rem; cursor:pointer; font-family:inherit; transition:0.2s;">⬆️ الملفات المرفوعة</button>
      <button onclick="goToAdminTab('comments')" style="background:${isBoard && curTab==='comments'?'#f59e0b':'rgba(255,255,255,0.14)'}; color:#fff; border:1px solid ${isBoard && curTab==='comments'?'#f59e0b':'rgba(255,255,255,0.25)'}; padding:6px 13px; border-radius:10px; font-weight:700; font-size:0.85rem; cursor:pointer; font-family:inherit; transition:0.2s;">💬 إدارة التعليقات والمناقشات</button>
      <button onclick="window.location.href='index.html'" style="background:${!isBoard?'#10b981':'rgba(255,255,255,0.14)'}; color:#fff; border:1px solid ${!isBoard?'#10b981':'rgba(255,255,255,0.25)'}; padding:6px 13px; border-radius:10px; font-weight:700; font-size:0.85rem; cursor:pointer; font-family:inherit; transition:0.2s;">🌐 تصفح المنصة كمسؤول</button>
      <button onclick="adminGlobalLogout()" style="background:#ef4444; color:#fff; border:1px solid #dc2626; padding:6px 13px; border-radius:10px; font-weight:700; font-size:0.85rem; cursor:pointer; font-family:inherit; transition:0.2s;">🚪 تسجيل الخروج</button>
    `;
  };

  window.goToAdminTab = function(tabName) {
    sessionStorage.setItem("sac_admin_tab", tabName);
    const currentPath = window.location.pathname.split("/").pop() || "index.html";
    if (currentPath === "admin.html" || currentPath.includes("admin.html")) {
      if (typeof switchBoard === "function") {
        switchBoard(tabName);
      } else {
        window.location.href = "admin.html";
      }
    } else {
      window.location.href = "admin.html";
    }
  };

  window.adminGlobalLogout = function() {
    localStorage.removeItem("sac_session");
    localStorage.removeItem("sac_role");
    localStorage.removeItem("sac_user_session");
    sessionStorage.removeItem("sac_admin_tab");
    if (typeof updateAuthNavbar === "function") updateAuthNavbar();
    if (typeof updateJilThaniNavbar === "function") updateJilThaniNavbar();
    if (typeof renderUserbox === "function") renderUserbox();
    const existing = document.getElementById("sacTopAdminToolbar");
    if (existing) existing.remove();
    const currentPath = window.location.pathname.split("/").pop() || "index.html";
    if (currentPath === "admin.html" || currentPath.includes("admin.html")) {
      window.location.href = "index.html";
    } else {
      window.location.reload();
    }
  };

  renderTopAdminToolbar();
})();
</script>
<!-- ========================================================================= -->
</body>
</html>
